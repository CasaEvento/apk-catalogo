name: Android CI - Compile Debug APK

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: write

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4
        with:
          allow-snapshots: true

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          wrapper-validation-enabled: false

      - name: Make Gradlew Executable
        run: chmod +x gradlew

      - name: Initialize Env File
        run: |
          if [ ! -f .env ]; then
            cp .env.example .env
          fi

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 7

      - name: Create or Update GitHub Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/'))
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: app/build/outputs/apk/debug/app-debug.apk
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest-debug' }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && format('Release {0}', github.ref_name) || 'Automated Debug Build' }}
          body: |
            ## Automated Android Debug Build

            This release contains the automatically compiled debug APK for developers and testers.

            ### Build Metadata
            - **Branch:** `${{ github.ref_name }}`
            - **Commit:** `${{ github.sha }}`
            - **Triggered By:** `${{ github.actor }}`
            - **Artifact:** `app-debug.apk`
          draft: false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
